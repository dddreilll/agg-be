name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dops_test
          POSTGRES_USER: dops
          POSTGRES_PASSWORD: dops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dops -d dops_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      NODE_ENV: test
      REDIS_URL: redis://localhost:6379
      DATABASE_URL: postgres://dops:dops@localhost:5432/dops_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only build the image on pushes (not PRs) to keep CI fast.
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: dops-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
