services:
  redis:
    image: redis:7-alpine
    container_name: dops-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: dops-postgres
    environment:
      POSTGRES_DB: dops
      POSTGRES_USER: dops
      POSTGRES_PASSWORD: dops
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dops -d dops"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: dops-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://dops:dops@postgres:5432/dops
      # Override via .env or environment secrets:
      # GRABFOOD_CLIENT_ID:
      # GRABFOOD_CLIENT_SECRET:
      # GRABFOOD_TOKEN_SECRET:
      # FOODPANDA_WEBHOOK_SECRET:
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis-data:
  pg-data:
